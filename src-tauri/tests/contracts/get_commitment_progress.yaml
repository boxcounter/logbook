command: get_commitment_progress
description: Compute commitment progress by aggregating entries across the month.
cases:
  - name: aggregates entries by goal
    before:
      - action: write_file
        path: "2026/06/commitments.yaml"
        content: |
          - role: Dev
            allocation: 40
            goals:
              - Ship it
      - action: write_file
        path: "2026/06/2026-06-01.md"
        content: |
          ---
          entries:
            - id: e1
              item: build feature
              duration: 120
              dimensions:
                goal: Ship it
            - id: e2
              item: bug fix
              duration: 60
              dimensions:
                goal: Ship it
          ---
    input:
      root_path: "{ROOT}"
      year: 2026
      month: 6
    expect:
      ok:
        roles.len: 1
        "roles.0.role": Dev
        "roles.0.allocation_minutes": 2400
        "roles.0.goal_spent_minutes": 180
        unattributed_count: 0
        unattributed_total_minutes: 0
        mismatch_count: 0

  - name: empty month returns zero progress
    before:
      - action: write_file
        path: "2026/06/commitments.yaml"
        content: "[]"
    input:
      root_path: "{ROOT}"
      year: 2026
      month: 6
    expect:
      ok:
        roles.len: 0
        unattributed_count: 0
        unattributed_total_minutes: 0
        mismatch_count: 0
