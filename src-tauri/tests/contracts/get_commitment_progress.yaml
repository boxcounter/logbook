command: get_commitment_progress
description: Compute commitment progress by aggregating entries across the month.
cases:
  - name: aggregates entries by goal
    before:
      - action: write_file
        path: "2026/06/_monthly.md"
        content: |
          ---
          commitments:
            - role: Dev
              allocation: 40
              goals:
                - Ship it
          ---
      - action: write_file
        path: "2026/06/2026-06-01.md"
        content: |
          ---
          entries:
            - id: e1
              item: build feature
              duration: 120
              dimensions:
                goal: Ship it
            - id: e2
              item: bug fix
              duration: 60
              dimensions:
                goal: Ship it
          ---
    input:
      root_path: "{ROOT}"
      year: 2026
      month: 6
    expect:
      ok:
        len: 1
        "0.role": Dev
        "0.allocation_minutes": 2400
        "0.spent_minutes": 180

  - name: empty month returns zero progress
    before:
      - action: write_file
        path: "2026/06/_monthly.md"
        content: |
          ---
          commitments: []
          ---
    input:
      root_path: "{ROOT}"
      year: 2026
      month: 6
    expect:
      ok: []
