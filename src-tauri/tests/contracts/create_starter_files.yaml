command: create_starter_files
description: Create initial template.yaml in an empty directory.
cases:
  - name: creates template.yaml in empty directory
    input:
      path: "{ROOT}"
    expect:
      ok:
        created: true

  - name: idempotent if config already exists
    before:
      - action: write_file
        path: "template.yaml"
        content: |
          dimensions:
            - name: Custom
              key: custom
              source: static
              values: [A]
    input:
      path: "{ROOT}"
    expect:
      ok:
        created: true
